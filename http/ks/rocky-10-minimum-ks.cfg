# =============================================================================
# Kickstart file — Rocky Linux 10 Minimal Automated Install
# Served at: http://<PXE_SERVER_IP>/ks/rocky-10-minimum-ks.cfg
# Set credentials before use — generate hash: python3 -c "import crypt; print(crypt.crypt('yourpassword'))"
# =============================================================================

# Installation method
url --url="http://<PXE_SERVER_IP>/rocky-10-minimum"

# Language and locale
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Network (DHCP during install)
network --bootproto=dhcp --device=link --activate --onboot=yes

# Security
firewall --enabled --service=ssh
selinux --enforcing

# Root password (generate hash: python3 -c "import crypt; print(crypt.crypt('yourpassword'))")
rootpw --iscrypted $6$rounds=4096$CHANGE_ME_SALT$CHANGE_ME_USE_HASHED_PASSWORD

# Admin user
user --name=admin --groups=wheel --iscrypted --password=$6$rounds=4096$CHANGE_ME_SALT$CHANGE_ME_USE_HASHED_PASSWORD

# Boot loader
bootloader --location=mbr

# Disk partitioning — wipe first disk automatically
ignoredisk --only-use=sda
clearpart --all --drives=sda --initlabel
autopart --type=lvm

# Text mode install
text
skipx

# Power off after install — then change VM boot order to disk
poweroff

# Minimal packages only — NO dnf update (saves 5-10 minutes)
%packages --ignoremissing
@^minimal-environment
openssh-server
vim
curl
wget
tar
%end

# Post-install
%post --log=/root/ks-post.log
systemctl enable sshd
echo "Rocky Linux 10 PXE install complete." >> /root/ks-post.log
%end
